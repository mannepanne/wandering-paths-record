#:schema node_modules/wrangler/config-schema.json
name = "wandering-paths-record"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "./src/worker.js"

# Static assets configuration - modern format for Vite compatibility
# Asset layer serves files from ./dist/client; unmatched paths fall back
# to /index.html so React Router handles deep links (/about, /restaurant/:id).
# `run_worker_first` keeps /api/* and /auth/login on the Worker.
[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/auth/login"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "wandering-paths"
database_id = "f928b168-fb21-4420-bff8-2f9320d3f22e"

# Environment variables (non-sensitive)
[vars]
AUTHORIZED_ADMIN_EMAIL = "magnus.hultberg@gmail.com"
CF_ACCESS_AUD = "24c0d43fd9d2755ac7b754a513d91ae607679cca259ebcddb1bbe99357c637b6"
CF_TEAM_DOMAIN = "https://herrings.cloudflareaccess.com"

# Custom domain configuration - force fresh route binding
[[routes]]
pattern = "restaurants.hultberg.org/"
zone_name = "hultberg.org"

[[routes]]
pattern = "restaurants.hultberg.org/*"
zone_name = "hultberg.org"

# Force cache invalidation
[analytics]
enabled = true

# Enable logging
[observability]
enabled = true